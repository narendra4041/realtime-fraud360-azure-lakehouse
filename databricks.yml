bundle:
  name: realtime-fraud360-azure-lakehouse

include:
  - resources/*.yml

variables:
  environment:
    description: Deployment environment
    default: dev

  spark_version:
    description: Databricks Runtime version
    default: "14.3.x-scala2.12"

  node_type_id:
    description: Databricks node type
    default: "Standard_D4s_v3"

  num_workers:
    description: Number of workers
    default: 1
  
  event_hub_bootstrap_servers:
    description: Azure Event Hubs Kafka bootstrap server

  event_hub_topic:
    description: Event Hub topic name

  event_hub_consumer_group:
    description: Event Hub consumer group

  event_hub_secret_scope:
    description: Databricks secret scope

  event_hub_connection_secret_key:
    description: Event Hub connection string secret key

  bronze_table_fqn:
    description: Bronze table fully qualified name

  silver_table_fqn:
    description: Silver table fully qualified name

  watermark_delay:
    description: Silver watermark delay
    default: "10 minutes"
  
  alert_email:
    description: Alert email for pipeline/job failures

  gold_customer_risk_mv_fqn:
    description: GOLD customer risk materialized view fully qualified name

  gold_merchant_risk_mv_fqn:
    description: GOLD merchant risk materialized view fully qualified name

  gold_daily_fraud_kpis_mv_fqn:
    description: GOLD daily fraud KPIs materialized view fully qualified name
    
targets:
  dev:
    mode: development
    default: true
    variables:
      environment: dev
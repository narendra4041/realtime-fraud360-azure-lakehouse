name: Databricks Bundle Dev Deploy

on:
  pull_request:
    branches:
      - main
    paths-ignore:
      - 'README.md'
      - 'docs/**'

  push:
    branches:
      - main
    paths-ignore:
      - 'README.md'
      - 'docs/**'

jobs:
  validate-and-deploy:
    runs-on: ubuntu-latest

    env:
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
      DATABRICKS_AUTH_TYPE: oauth-m2m
      DATABRICKS_CLIENT_ID: ${{ secrets.DATABRICKS_CLIENT_ID }}
      DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET }}

      BUNDLE_VAR_event_hub_bootstrap_servers: ${{ secrets.EVENT_HUB_BOOTSTRAP_SERVERS }}
      BUNDLE_VAR_event_hub_topic: fraud-transactions
      BUNDLE_VAR_event_hub_consumer_group: databricks-bronze-cg
      BUNDLE_VAR_event_hub_secret_scope: fraud360
      BUNDLE_VAR_event_hub_connection_secret_key: eventhubs-conn-string

      BUNDLE_VAR_bronze_table_fqn: fraud360.bronze.transactions_raw
      BUNDLE_VAR_silver_table_fqn: fraud360.silver.transactions_clean

      BUNDLE_VAR_watermark_delay: "10 minutes"

      BUNDLE_VAR_gold_customer_risk_mv_fqn: fraud360.gold.mv_customer_risk_summary
      BUNDLE_VAR_gold_merchant_risk_mv_fqn: fraud360.gold.mv_merchant_risk_summary
      BUNDLE_VAR_gold_daily_fraud_kpis_mv_fqn: fraud360.gold.mv_daily_fraud_kpis

      BUNDLE_VAR_node_type_id: Standard_D4s_v5
      BUNDLE_VAR_num_workers: 1
      BUNDLE_VAR_alert_email: ${{ secrets.ALERT_EMAIL }}


    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Databricks CLI
        uses: databricks/setup-cli@main

      - name: Validate bundle
        run: databricks bundle validate -t dev

      - name: Deploy bundle
        if: github.event_name == 'push'
        run: databricks bundle deploy -t dev
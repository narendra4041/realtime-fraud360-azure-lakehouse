resources:
  pipelines:
    fraud360_bronze_silver_pipeline:
      name: fraud360_${var.environment}_bronze_silver_pipeline

      catalog: fraud360
      target: bronze

      continuous: true
      serverless: true

      libraries:
        - file:
            path: ../databricks/pipelines/fraud360_bronze_silver_pipeline.py

      configuration:
        ENV: ${var.environment}

        EVENT_HUB_BOOTSTRAP_SERVERS: ${var.event_hub_bootstrap_servers}
        EVENT_HUB_TOPIC: ${var.event_hub_topic}
        EVENT_HUB_CONSUMER_GROUP: ${var.event_hub_consumer_group}
        EVENT_HUB_SECRET_SCOPE: ${var.event_hub_secret_scope}
        EVENT_HUB_CONNECTION_SECRET_KEY: ${var.event_hub_connection_secret_key}

        BRONZE_TABLE_FQN: ${var.bronze_table_fqn}
        SILVER_TABLE_FQN: ${var.silver_table_fqn}

        WATERMARK_DELAY: ${var.watermark_delay}

        GOLD_CUSTOMER_RISK_MV_FQN: ${var.gold_customer_risk_mv_fqn}
        GOLD_MERCHANT_RISK_MV_FQN: ${var.gold_merchant_risk_mv_fqn}
        GOLD_DAILY_FRAUD_KPIS_MV_FQN: ${var.gold_daily_fraud_kpis_mv_fqn}
      
      notifications:
        - email_recipients:
          - ${var.alert_email}
          alerts:
          - on-update-failure
          - on-flow-failure